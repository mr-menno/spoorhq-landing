<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>spoorhq</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --fg: #c8c8c8;
      --dim: #555;
      --accent: #e8e8e8;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.7;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .terminal {
      max-width: 480px;
      width: 100%;
    }

    .prompt {
      color: var(--dim);
    }

    .output {
      color: var(--fg);
      padding-left: 1.4rem;
    }

    .output.accent {
      color: var(--accent);
    }

    .blank {
      height: 1.7em;
    }

    .cursor {
      display: inline-block;
      width: 0.55em;
      height: 1em;
      background: var(--fg);
      vertical-align: text-bottom;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .cursor { animation: none; }
    }
  </style>
</head>
<body>
  <div class="terminal" role="main" aria-label="Status terminal">
    <div class="prompt">$ host spoorhq.com</div>
    <div class="blank"></div>
    <div class="output accent">spoorhq</div>
    <div class="blank"></div>
    <div class="output">status  : in active development</div>
    <div class="output">release : not yet</div>
    <div class="blank"></div>
    <div class="prompt">$ <span class="cursor" aria-hidden="true"></span></div>
  </div>
</body>
</html>
